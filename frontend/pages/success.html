<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Gracias por tu compra! - Luxuriette</title>
 <style>
        .success-container {
            max-width: 600px;
            margin: 100px auto;
            text-align: center;
            padding: 20px;
            background: #1a1a1a;
            color: white;
            border-radius: 15px;
            border: 1px solid #ff00ff;
        }
        .btn-ws {
            background-color: #25d366;
            color: white;
            padding: 15px 25px;
            text-decoration: none;
            border-radius: 5px;
            display: inline-block;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
    <link href="../style.css" rel="stylesheet" />
</head>
<body>
    <div class="success-container">
        <h1>✨ ¡Pago Exitoso! ✨</h1>
        <p>Gracias por confiar en <strong>Luxuriette</strong>.</p>
        <p>Tu pago ha sido procesado correctamente.</p>
        
        <div id="order-info">
            </div>

        <a href="#" id="whatsapp-confirm" class="btn-ws">
            Confirmar pedido por WhatsApp 📱
        </a>

        <br><br>
        <a href="../index.html" style="color: #ccc;">Volver a la tienda</a>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Obtener datos del pago de la URL (Mercado Pago los envía por GET)
            const urlParams = new URLSearchParams(window.location.search);
            const paymentId = urlParams.get('payment_id');
            const status = urlParams.get('status');

            if (status === 'approved') {
                document.getElementById('order-info').innerHTML = `
                    <p style="color: #00ff00;">ID de Operación: ${paymentId}</p>
                `;

                // 2. Leer carrito para armar el mensaje y luego limpiarlo
                let lista = "";
                let total = 0;
                try {
                    const cartStr = localStorage.getItem("cart");
                    if (cartStr) {
                        const carrito = JSON.parse(cartStr);
                        lista = carrito.map(i => `- ${i.nombre} x${i.quantity}`).join('%0A');
                        total = carrito.reduce((sum, item) => sum + (item.precio * item.quantity), 0);
                    }
                } catch (e) { console.error("Error carrito", e); }

                localStorage.removeItem("cart");

                // 3. Configurar el botón de WhatsApp
                const wsButton = document.getElementById('whatsapp-confirm');
                let mensaje = "";
                if (lista) {
                    mensaje = `¡Hola *Luxuriette*! Acabo de realizar un pedido.%0A*ID de Pedido:* ${paymentId}%0A*Método de Pago:* Mercado Pago%0A*Detalle:*%0A${lista}%0A*Total:* $${total.toFixed(2)}%0A_Aviso de pago realizado exitosamente._`;
                } else {
                    mensaje = encodeURIComponent(`¡Hola *Luxuriette*! Acabo de realizar un pago en el sitio. ID de operación: ${paymentId}.`);
                }
                
                wsButton.href = `https://wa.me/5493757677266?text=${mensaje}`;
            }
        });
    </script>
</body>
</html>
